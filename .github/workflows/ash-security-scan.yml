name: ASH Security Scan

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  ash-scan:
    name: Automated Security Helper Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install ASH
        run: pip install git+https://github.com/awslabs/automated-security-helper.git@v3.2.2

      - name: Run ASH Security Scan
        run: ash --mode local
        continue-on-error: true

      - name: Upload ASH Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ash-security-report
          path: .ash/ash_output/
          retention-days: 30

      - name: Post Summary to PR
        if: github.event_name == 'pull_request'
        run: |
          if [ -f ".ash/ash_output/reports/ash.summary.md" ]; then
            echo "## 🔐 ASH Security Scan Results" >> $GITHUB_STEP_SUMMARY
            cat .ash/ash_output/reports/ash.summary.md >> $GITHUB_STEP_SUMMARY
          fi

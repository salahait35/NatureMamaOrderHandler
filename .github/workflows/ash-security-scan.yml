name: ASH Security Scan

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  ash-scan:
    name: Automated Security Helper Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Clone ASH
        run: |
          git clone --depth 1 --branch v3.2.2 \
            https://github.com/awslabs/automated-security-helper.git /tmp/ash

      - name: Run ASH Security Scan
        run: |
          /tmp/ash/ash \
            --source-dir "$(pwd)" \
            --output-dir "$(pwd)/.ash/ash_output" \
            --force
        continue-on-error: true

      - name: Upload ASH Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ash-security-report
          path: .ash/ash_output/
          retention-days: 30

      - name: Post Summary to PR
        if: github.event_name == 'pull_request'
        run: |
          if [ -f ".ash/ash_output/ash_report.txt" ]; then
            echo "## 🔐 ASH Security Scan Results" >> $GITHUB_STEP_SUMMARY
            head -100 .ash/ash_output/ash_report.txt >> $GITHUB_STEP_SUMMARY
          fi
